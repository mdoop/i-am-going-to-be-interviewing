services:
  postgres:
    image: postgres:16
    container_name: retail-pricing-postgres
    environment:
      POSTGRES_DB: retail_pricing
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_pricing"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:7.2
    container_name: retail-pricing-valkey
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: retail-pricing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: retail-pricing-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

