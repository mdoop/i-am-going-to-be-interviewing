global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: pricing-service-java-render
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["interview-pricing-java.onrender.com"]
        labels:
          environment: render

  - job_name: pricing-service-kotlin-render
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["interview-pricing-kotlin.onrender.com"]
        labels:
          environment: render
